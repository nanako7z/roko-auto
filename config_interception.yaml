# Interception 驱动配置（接近真实设备输入）

driver:
  # Interception 的 DLL 路径。
  # 可写绝对路径，例如: C:\\tools\\interception\\interception.dll
  # 也可仅写文件名 interception.dll（需确保在当前目录或系统 PATH 中）
  dll_path: interception.dll

schedule:
  # 基础执行周期（秒）
  interval_sec: 20
  # 每个周期的随机浮动范围（秒，最终是 ±jitter_sec）
  jitter_sec: 5
  # 启动后延迟多少秒再开始第一轮执行
  start_delay_sec: 3

options:
  # 按键按下后保持时长（秒），用于模拟更自然的按键
  default_hold_sec: 0.03
  # 每轮执行完成后额外暂停时长（秒）
  pause_between_cycles_sec: 0

commands:
  # 按顺序执行的命令列表，支持：
  # 1) type: key    -> 单键（例如 tab / 1 / a）
  # 2) type: wait   -> 等待秒数
  # 3) type: hotkey -> 组合键（例如 [ctrl, shift, esc]）

  # 示例流程：按下 tab -> 等待 2 秒 -> 按下 2
  - type: key
    key: tab

  - type: wait
    sec: 2

  - type: key
    key: "2"
