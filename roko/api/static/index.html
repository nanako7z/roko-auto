<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roko-auto</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #161822;
  --bg3: #1e2030;
  --border: #2e3148;
  --text: #cdd6f4;
  --text2: #a6adc8;
  --accent: #89b4fa;
  --accent2: #74c7ec;
  --green: #a6e3a1;
  --red: #f38ba8;
  --yellow: #f9e2af;
  --orange: #fab387;
  --mauve: #cba6f7;
  --surface: #313244;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif; background:var(--bg); color:var(--text); line-height:1.5; min-height:100vh; }
button { cursor:pointer; font-family:inherit; }
input,textarea,select { font-family:inherit; }

/* Layout */
.app { display:flex; height:100vh; }
.sidebar { width:260px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* Sidebar */
.sidebar-header { padding:20px; border-bottom:1px solid var(--border); }
.sidebar-header h1 { font-size:18px; font-weight:600; color:var(--accent); }
.sidebar-header .subtitle { font-size:12px; color:var(--text2); margin-top:2px; }
.sidebar-nav { padding:8px; flex:1; overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius); color:var(--text2); font-size:14px; cursor:pointer; transition:all .15s; border:none; background:none; width:100%; text-align:left; }
.nav-item:hover { background:var(--bg3); color:var(--text); }
.nav-item.active { background:var(--bg3); color:var(--accent); }
.nav-item .icon { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
.sidebar-status { padding:16px; border-top:1px solid var(--border); font-size:12px; color:var(--text2); }
.sidebar-status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.dot-green { background:var(--green); }
.dot-red { background:var(--red); }

/* Top bar */
.topbar { height:56px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:var(--bg2); flex-shrink:0; }
.topbar h2 { font-size:16px; font-weight:600; }
.topbar-actions { display:flex; gap:8px; }

/* Content */
.content { flex:1; overflow-y:auto; padding:24px; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius); font-size:13px; font-weight:500; border:1px solid var(--border); background:var(--bg3); color:var(--text); transition:all .15s; }
.btn:hover { background:var(--surface); border-color:var(--text2); }
.btn-primary { background:var(--accent); color:var(--bg); border-color:var(--accent); }
.btn-primary:hover { opacity:.85; }
.btn-success { background:var(--green); color:var(--bg); border-color:var(--green); }
.btn-success:hover { opacity:.85; }
.btn-danger { background:var(--red); color:var(--bg); border-color:var(--red); }
.btn-danger:hover { opacity:.85; }
.btn-warning { background:var(--orange); color:var(--bg); border-color:var(--orange); }
.btn-warning:hover { opacity:.85; }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-icon { padding:6px 8px; }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }
.card-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.card-body { padding:20px; }

/* Task list */
.task-list { display:flex; flex-direction:column; gap:12px; }
.task-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; display:flex; align-items:center; gap:16px; transition:all .15s; }
.task-card:hover { border-color:var(--text2); }
.task-status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.task-status-dot.running { background:var(--green); box-shadow:0 0 8px var(--green); }
.task-status-dot.idle { background:var(--text2); }
.task-status-dot.paused { background:var(--yellow); }
.task-status-dot.error { background:var(--red); box-shadow:0 0 8px var(--red); }
.task-status-dot.completed { background:var(--accent); }
.task-info { flex:1; min-width:0; }
.task-name { font-size:15px; font-weight:600; }
.task-meta { font-size:12px; color:var(--text2); margin-top:4px; display:flex; gap:16px; flex-wrap:wrap; }
.task-actions { display:flex; gap:6px; flex-shrink:0; }

/* Badge */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-running { background:rgba(166,227,161,.15); color:var(--green); }
.badge-idle { background:rgba(166,172,200,.1); color:var(--text2); }
.badge-paused { background:rgba(249,226,175,.15); color:var(--yellow); }
.badge-error { background:rgba(243,139,168,.15); color:var(--red); }
.badge-completed { background:rgba(137,180,250,.15); color:var(--accent); }

/* Forms */
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; color:var(--text2); margin-bottom:6px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
input[type="text"], input[type="number"], select, textarea {
  width:100%; padding:9px 12px; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text); font-size:14px; outline:none; transition:border .15s;
}
input:focus, select:focus, textarea:focus { border-color:var(--accent); }
textarea { resize:vertical; min-height:120px; font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; }
.form-hint { font-size:11px; color:var(--text2); margin-top:4px; }

/* Modal */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:100; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:12px; width:680px; max-width:90vw; max-height:90vh; display:flex; flex-direction:column; }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size:16px; }
.modal-body { padding:24px; overflow-y:auto; flex:1; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.close-btn { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; padding:4px; }
.close-btn:hover { color:var(--text); }

/* Screen monitor */
.monitor-container { text-align:center; }
.monitor-frame { display:inline-block; border:2px solid var(--border); border-radius:var(--radius); overflow:hidden; background:var(--bg); position:relative; }
.monitor-frame img { max-width:100%; height:auto; display:block; }
.monitor-controls { margin-top:16px; display:flex; align-items:center; justify-content:center; gap:12px; }
.monitor-status { font-size:12px; color:var(--text2); }

/* System info */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; }
.stat-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.stat-label { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
.stat-value { font-size:28px; font-weight:700; margin-top:4px; }
.stat-value.green { color:var(--green); }
.stat-value.accent { color:var(--accent); }
.stat-value.orange { color:var(--orange); }

/* Empty state */
.empty-state { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-state .icon { font-size:48px; margin-bottom:16px; opacity:.5; }
.empty-state p { margin-bottom:20px; }

/* Toast */
.toast-container { position:fixed; top:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px; }
.toast { padding:12px 20px; border-radius:var(--radius); font-size:13px; animation:slideIn .3s; max-width:400px; }
.toast-success { background:rgba(166,227,161,.15); border:1px solid var(--green); color:var(--green); }
.toast-error { background:rgba(243,139,168,.15); border:1px solid var(--red); color:var(--red); }
.toast-info { background:rgba(137,180,250,.15); border:1px solid var(--accent); color:var(--accent); }
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

/* Tab bar */
.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab { padding:10px 20px; font-size:13px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; background:none; border-top:none; border-left:none; border-right:none; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text2); }

/* Hide sections */
.section { display:none; }
.section.active { display:block; }

/* YAML preview */
.yaml-preview { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:16px; font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; white-space:pre-wrap; word-break:break-all; max-height:400px; overflow-y:auto; color:var(--text2); line-height:1.6; }

/* Responsive */
@media(max-width:768px) {
  .sidebar { width:60px; }
  .sidebar-header h1, .sidebar-header .subtitle, .nav-item span:not(.icon), .sidebar-status { display:none; }
  .nav-item { justify-content:center; padding:12px; }
  .form-row, .form-row-3 { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>roko-auto</h1>
      <div class="subtitle">自动化调度平台</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showSection('tasks')">
        <span class="icon">&#9776;</span><span>任务管理</span>
      </button>
      <button class="nav-item" onclick="showSection('monitor')">
        <span class="icon">&#9673;</span><span>屏幕监控</span>
      </button>
      <button class="nav-item" onclick="showSection('system')">
        <span class="icon">&#9881;</span><span>系统状态</span>
      </button>
    </nav>
    <div class="sidebar-status" id="sidebarStatus">
      <span class="dot dot-green"></span>连接中...
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- ===== Tasks Section ===== -->
    <div class="section active" id="section-tasks">
      <div class="topbar">
        <h2>任务管理</h2>
        <div class="topbar-actions">
          <button class="btn btn-sm" onclick="refreshTasks()">刷新</button>
          <button class="btn btn-sm btn-primary" onclick="openTaskModal()">+ 新建任务</button>
        </div>
      </div>
      <div class="content">
        <div id="taskList" class="task-list"></div>
      </div>
    </div>

    <!-- ===== Monitor Section ===== -->
    <div class="section" id="section-monitor">
      <div class="topbar">
        <h2>屏幕监控</h2>
        <div class="topbar-actions">
          <button class="btn btn-sm" id="monitorToggle" onclick="toggleMonitor()">开始</button>
        </div>
      </div>
      <div class="content">
        <div class="monitor-container">
          <div class="monitor-frame">
            <img id="monitorImg" src="" alt="屏幕截图将显示在此处"
                 style="min-width:640px;min-height:360px;background:var(--bg);">
          </div>
          <div class="monitor-controls">
            <label style="font-size:13px;color:var(--text2);">
              刷新间隔：
              <select id="monitorInterval" style="width:auto;padding:4px 8px;font-size:12px;">
                <option value="1000">1 秒</option>
                <option value="2000" selected>2 秒</option>
                <option value="5000">5 秒</option>
                <option value="10000">10 秒</option>
              </select>
            </label>
            <span class="monitor-status" id="monitorStatus">已停止</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== System Section ===== -->
    <div class="section" id="section-system">
      <div class="topbar">
        <h2>系统状态</h2>
        <div class="topbar-actions">
          <button class="btn btn-sm" onclick="refreshSystem()">刷新</button>
        </div>
      </div>
      <div class="content">
        <div class="stats-grid" id="systemStats"></div>
      </div>
    </div>

  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal" style="display:none;" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="taskModalTitle">新建任务</h3>
      <button class="close-btn" onclick="closeTaskModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'tabForm')">表单模式</button>
        <button class="tab" onclick="switchTab(this,'tabYaml')">YAML 模式</button>
      </div>

      <!-- Form tab -->
      <div id="tabForm">
        <div class="form-row">
          <div class="form-group">
            <label>任务名称</label>
            <input type="text" id="fName" placeholder="例如 keep_alive">
          </div>
          <div class="form-group">
            <label>是否启用</label>
            <select id="fEnabled">
              <option value="true">是</option>
              <option value="false">否</option>
            </select>
          </div>
        </div>

        <h4 style="font-size:13px;color:var(--accent);margin:20px 0 12px;">调度设置</h4>
        <div class="form-row-3">
          <div class="form-group">
            <label>调度类型</label>
            <select id="fSchedType" onchange="onSchedTypeChange()">
              <option value="interval">固定周期</option>
              <option value="cron">Cron 表达式</option>
              <option value="oneshot">单次执行</option>
            </select>
          </div>
          <div class="form-group" id="fIntervalGroup">
            <label>执行周期（秒）</label>
            <input type="number" id="fInterval" value="20" min="1" step="1">
          </div>
          <div class="form-group" id="fCronGroup" style="display:none;">
            <label>Cron 表达式</label>
            <input type="text" id="fCron" placeholder="*/5 * * * *">
          </div>
          <div class="form-group">
            <label>随机抖动（秒）</label>
            <input type="number" id="fJitter" value="0" min="0" step="0.5">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>启动延迟（秒）</label>
            <input type="number" id="fDelay" value="0" min="0" step="1">
          </div>
          <div class="form-group">
            <label>周期间额外暂停（秒）</label>
            <input type="number" id="fPause" value="0" min="0" step="0.5">
          </div>
        </div>

        <h4 style="font-size:13px;color:var(--accent);margin:20px 0 12px;">执行选项</h4>
        <div class="form-row-3">
          <div class="form-group">
            <label>按键保持时长（秒）</label>
            <input type="number" id="fHold" value="0.1" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>鼠标移动耗时（秒）</label>
            <input type="number" id="fMoveDur" value="0.8" min="0" step="0.1">
          </div>
          <div class="form-group">
            <label>鼠标移动曲率</label>
            <input type="number" id="fWobble" value="0.1" min="0" step="0.05">
          </div>
        </div>

        <h4 style="font-size:13px;color:var(--accent);margin:20px 0 12px;">命令配置</h4>
        <div class="form-group">
          <label>命令文件（可选，填写后优先使用文件中的命令）</label>
          <input type="text" id="fCmdFile" placeholder="commands/my_sequence.yaml">
        </div>
        <div class="form-group">
          <label>命令列表（YAML 格式）</label>
          <textarea id="fCommands" rows="8" placeholder="- type: key
  key: tab
- type: wait
  sec: 2"></textarea>
          <div class="form-hint">YAML 格式，每项必须包含 <code>type</code> 字段。支持类型：key、hotkey、wait、mouse_click、mouse_move、mouse_scroll、file</div>
        </div>
      </div>

      <!-- YAML tab -->
      <div id="tabYaml" style="display:none;">
        <div class="form-group">
          <label>完整任务配置（YAML）</label>
          <textarea id="fYamlFull" rows="20" placeholder="name: my_task
enabled: true
schedule:
  type: interval
  interval_sec: 20
commands:
  - type: key
    key: tab"></textarea>
          <div class="form-hint">在此粘贴或直接编辑完整的任务配置 YAML</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTaskModal()">取消</button>
      <button class="btn btn-primary" id="taskModalSave" onclick="saveTask()">创建</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
const API = '';  // same origin

// ── 状态标签映射 ──
const STATE_LABELS = {
  running: '运行中',
  idle: '空闲',
  paused: '已暂停',
  error: '异常',
  completed: '已完成',
};

// ── State ──
let currentSection = 'tasks';
let editingTask = null;
let monitorTimer = null;
let tasks = [];

// ── Navigation ──
function showSection(name) {
  currentSection = name;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['tasks','monitor','system'].indexOf(name)].classList.add('active');
  if (name === 'tasks') refreshTasks();
  if (name === 'system') refreshSystem();
}

// ── Toast ──
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── API helpers ──
async function api(path, opts={}) {
  try {
    const res = await fetch(API + path, {
      headers: {'Content-Type':'application/json', ...opts.headers},
      ...opts
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || res.statusText);
    }
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('json')) return res.json();
    return res;
  } catch(e) {
    toast(e.message, 'error');
    throw e;
  }
}

// ── Tasks ──
async function refreshTasks() {
  try {
    tasks = await api('/api/tasks');
    renderTasks();
  } catch(e) {}
}

function renderTasks() {
  const el = document.getElementById('taskList');
  if (!tasks.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="icon">&#9776;</div>
      <p>暂无任务</p>
      <button class="btn btn-primary" onclick="openTaskModal()">+ 创建第一个任务</button>
    </div>`;
    return;
  }
  el.innerHTML = tasks.map(t => {
    const s = t.status;
    const c = t.config;
    const state = s.state || 'idle';
    const stateLabel = STATE_LABELS[state] || state;
    const schedType = c.schedule.type;
    const schedDesc = schedType === 'cron'
      ? c.schedule.cron_expression
      : schedType === 'interval'
        ? c.schedule.interval_sec + '秒' + (c.schedule.jitter_sec ? ' \u00b1' + c.schedule.jitter_sec + '秒' : '')
        : '单次执行';
    const lastRun = s.last_run ? new Date(s.last_run).toLocaleTimeString() : '-';
    return `<div class="task-card">
      <div class="task-status-dot ${state}"></div>
      <div class="task-info">
        <div class="task-name">${esc(c.name)} <span class="badge badge-${state}">${stateLabel}</span></div>
        <div class="task-meta">
          <span>调度：${esc(schedDesc)}</span>
          <span>已执行：${s.cycle_count} 次</span>
          <span>上次：${lastRun}</span>
          ${s.last_error ? '<span style="color:var(--red)">错误：' + esc(s.last_error.substring(0,60)) + '</span>' : ''}
        </div>
      </div>
      <div class="task-actions">
        ${state === 'running'
          ? `<button class="btn btn-sm btn-warning" onclick="taskAction('${esc(c.name)}','pause')">暂停</button>
             <button class="btn btn-sm btn-danger" onclick="taskAction('${esc(c.name)}','stop')">停止</button>`
          : state === 'paused'
          ? `<button class="btn btn-sm btn-success" onclick="taskAction('${esc(c.name)}','resume')">恢复</button>
             <button class="btn btn-sm btn-danger" onclick="taskAction('${esc(c.name)}','stop')">停止</button>`
          : `<button class="btn btn-sm btn-success" onclick="taskAction('${esc(c.name)}','start')">启动</button>`
        }
        <button class="btn btn-sm" onclick="taskAction('${esc(c.name)}','trigger')">触发</button>
        <button class="btn btn-sm" onclick="editTask('${esc(c.name)}')">编辑</button>
        <button class="btn btn-sm btn-danger btn-icon" onclick="deleteTask('${esc(c.name)}')" title="删除">&times;</button>
      </div>
    </div>`;
  }).join('');
}

const ACTION_LABELS = {
  start: '已启动', stop: '已停止', pause: '已暂停', resume: '已恢复', trigger: '已触发'
};

async function taskAction(name, action) {
  try {
    await api(`/api/tasks/${encodeURIComponent(name)}/${action}`, {method:'POST'});
    toast(`任务 "${name}" ${ACTION_LABELS[action] || action}`, 'success');
    refreshTasks();
  } catch(e) {}
}

async function deleteTask(name) {
  if (!confirm(`确认删除任务 "${name}"？`)) return;
  try {
    await api(`/api/tasks/${encodeURIComponent(name)}`, {method:'DELETE'});
    toast(`任务 "${name}" 已删除`, 'success');
    refreshTasks();
  } catch(e) {}
}

// ── Task Modal ──
function openTaskModal(task=null) {
  editingTask = task;
  document.getElementById('taskModalTitle').textContent = task ? '编辑任务' : '新建任务';
  document.getElementById('taskModalSave').textContent = task ? '保存' : '创建';

  if (task) {
    const c = task.config;
    document.getElementById('fName').value = c.name;
    document.getElementById('fName').disabled = true;
    document.getElementById('fEnabled').value = String(c.enabled);
    document.getElementById('fSchedType').value = c.schedule.type;
    document.getElementById('fInterval').value = c.schedule.interval_sec || 20;
    document.getElementById('fCron').value = c.schedule.cron_expression || '';
    document.getElementById('fJitter').value = c.schedule.jitter_sec || 0;
    document.getElementById('fDelay').value = c.schedule.start_delay_sec || 0;
    document.getElementById('fPause').value = c.options.pause_between_cycles_sec || 0;
    document.getElementById('fHold').value = c.options.default_hold_sec ?? 0.1;
    document.getElementById('fMoveDur').value = c.options.mouse_move_default_duration_sec ?? 0.8;
    document.getElementById('fWobble').value = c.options.mouse_move_default_wobble ?? 0.1;
    document.getElementById('fCmdFile').value = c.command_file || '';
    document.getElementById('fCommands').value = c.commands && c.commands.length
      ? commandsToYaml(c.commands) : '';
    document.getElementById('fYamlFull').value = taskToYaml(c);
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fName').disabled = false;
    document.getElementById('fEnabled').value = 'true';
    document.getElementById('fSchedType').value = 'interval';
    document.getElementById('fInterval').value = 20;
    document.getElementById('fCron').value = '';
    document.getElementById('fJitter').value = 0;
    document.getElementById('fDelay').value = 0;
    document.getElementById('fPause').value = 0;
    document.getElementById('fHold').value = 0.1;
    document.getElementById('fMoveDur').value = 0.8;
    document.getElementById('fWobble').value = 0.1;
    document.getElementById('fCmdFile').value = '';
    document.getElementById('fCommands').value = '- type: key\n  key: tab';
    document.getElementById('fYamlFull').value = '';
  }
  onSchedTypeChange();
  switchTab(document.querySelector('.tab'), 'tabForm');
  document.getElementById('taskModal').style.display = 'flex';
}

function closeTaskModal() {
  document.getElementById('taskModal').style.display = 'none';
  editingTask = null;
}

function switchTab(btn, tabId) {
  btn.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabForm').style.display = tabId === 'tabForm' ? 'block' : 'none';
  document.getElementById('tabYaml').style.display = tabId === 'tabYaml' ? 'block' : 'none';
  if (tabId === 'tabYaml' && !editingTask) {
    document.getElementById('fYamlFull').value = buildYamlFromForm();
  }
}

function onSchedTypeChange() {
  const t = document.getElementById('fSchedType').value;
  document.getElementById('fIntervalGroup').style.display = t === 'interval' ? '' : 'none';
  document.getElementById('fCronGroup').style.display = t === 'cron' ? '' : 'none';
}

async function saveTask() {
  const yamlTabVisible = document.getElementById('tabYaml').style.display !== 'none';
  let payload;

  if (yamlTabVisible && document.getElementById('fYamlFull').value.trim()) {
    try {
      payload = parseSimpleYaml(document.getElementById('fYamlFull').value);
    } catch(e) {
      toast('YAML 格式错误：' + e.message, 'error');
      return;
    }
  } else {
    payload = buildPayloadFromForm();
    if (!payload) return;
  }

  try {
    if (editingTask) {
      await api(`/api/tasks/${encodeURIComponent(editingTask.config.name)}`, {
        method: 'PUT',
        body: JSON.stringify(payload)
      });
      toast('任务已更新', 'success');
    } else {
      await api('/api/tasks', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      toast('任务已创建', 'success');
    }
    closeTaskModal();
    refreshTasks();
  } catch(e) {}
}

function buildPayloadFromForm() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('请输入任务名称', 'error'); return null; }

  const schedType = document.getElementById('fSchedType').value;
  const schedule = {
    type: schedType,
    jitter_sec: parseFloat(document.getElementById('fJitter').value) || 0,
    start_delay_sec: parseFloat(document.getElementById('fDelay').value) || 0,
  };
  if (schedType === 'interval') {
    schedule.interval_sec = parseFloat(document.getElementById('fInterval').value) || 20;
  }
  if (schedType === 'cron') {
    schedule.cron_expression = document.getElementById('fCron').value.trim() || '*/5 * * * *';
  }

  const options = {
    default_hold_sec: parseFloat(document.getElementById('fHold').value) || 0.1,
    pause_between_cycles_sec: parseFloat(document.getElementById('fPause').value) || 0,
    mouse_move_default_duration_sec: parseFloat(document.getElementById('fMoveDur').value) || 0.8,
    mouse_move_default_wobble: parseFloat(document.getElementById('fWobble').value) || 0.1,
  };

  const cmdFile = document.getElementById('fCmdFile').value.trim();
  let commands = [];
  const cmdText = document.getElementById('fCommands').value.trim();
  if (cmdText) {
    try {
      commands = parseSimpleYamlList(cmdText);
    } catch(e) {
      toast('命令列表 YAML 格式错误：' + e.message, 'error');
      return null;
    }
  }

  return {
    name,
    enabled: document.getElementById('fEnabled').value === 'true',
    schedule,
    options,
    commands,
    command_file: cmdFile || null,
  };
}

// ── Minimal YAML parser (for commands) ──
function parseSimpleYamlList(text) {
  const items = [];
  let current = null;
  for (const line of text.split('\n')) {
    const trimmed = line.trimEnd();
    if (trimmed === '' || trimmed.startsWith('#')) continue;
    if (trimmed.startsWith('- ')) {
      if (current) items.push(current);
      current = {};
      const rest = trimmed.substring(2).trim();
      if (rest) {
        const [k, ...v] = rest.split(':');
        if (v.length) current[k.trim()] = parseYamlValue(v.join(':').trim());
      }
    } else if (current && trimmed.startsWith('  ')) {
      const kv = trimmed.trim();
      const idx = kv.indexOf(':');
      if (idx > 0) {
        const k = kv.substring(0, idx).trim();
        const v = kv.substring(idx+1).trim();
        current[k] = parseYamlValue(v);
      }
    }
  }
  if (current) items.push(current);
  return items;
}

function parseYamlValue(v) {
  if (v === 'true') return true;
  if (v === 'false') return false;
  if (v === 'null' || v === '') return null;
  if (/^-?\d+$/.test(v)) return parseInt(v);
  if (/^-?\d+\.\d+$/.test(v)) return parseFloat(v);
  if (v.startsWith('[') && v.endsWith(']')) {
    return v.slice(1,-1).split(',').map(s => parseYamlValue(s.trim()));
  }
  if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
    return v.slice(1,-1);
  }
  return v;
}

function parseSimpleYaml(text) {
  const result = {};
  let currentKey = null;
  let currentObj = result;
  const stack = [{obj: result, indent: -1}];

  for (const line of text.split('\n')) {
    if (line.trim() === '' || line.trim().startsWith('#')) continue;
    const indent = line.search(/\S/);
    const content = line.trim();

    while (stack.length > 1 && indent <= stack[stack.length-1].indent) {
      stack.pop();
    }
    currentObj = stack[stack.length-1].obj;

    if (content.startsWith('- ')) {
      const parentKey = Object.keys(currentObj).pop();
      if (parentKey && !Array.isArray(currentObj[parentKey])) {
        currentObj[parentKey] = [];
      }
      const rest = content.substring(2).trim();
      if (rest.includes(':')) {
        const item = {};
        const [k, ...v] = rest.split(':');
        item[k.trim()] = parseYamlValue(v.join(':').trim());
        currentObj[parentKey].push(item);
        stack.push({obj: item, indent: indent + 2});
      } else {
        currentObj[parentKey].push(parseYamlValue(rest));
      }
      continue;
    }

    const idx = content.indexOf(':');
    if (idx > 0) {
      const key = content.substring(0, idx).trim();
      const val = content.substring(idx+1).trim();
      if (val === '' || val === '|') {
        currentObj[key] = {};
        stack.push({obj: currentObj[key], indent: indent});
      } else {
        currentObj[key] = parseYamlValue(val);
      }
    }
  }
  return result;
}

// ── YAML serialization (for display) ──
function commandsToYaml(cmds) {
  return cmds.map(c => {
    let s = '- type: ' + c.type;
    for (const [k,v] of Object.entries(c)) {
      if (k === 'type') continue;
      if (Array.isArray(v)) {
        s += '\n  ' + k + ': [' + v.join(', ') + ']';
      } else {
        s += '\n  ' + k + ': ' + v;
      }
    }
    return s;
  }).join('\n');
}

function taskToYaml(c) {
  let y = `name: ${c.name}\nenabled: ${c.enabled}\n\nschedule:\n  type: ${c.schedule.type}\n`;
  if (c.schedule.type === 'interval') y += `  interval_sec: ${c.schedule.interval_sec}\n`;
  if (c.schedule.type === 'cron') y += `  cron_expression: "${c.schedule.cron_expression || '*/5 * * * *'}"\n`;
  if (c.schedule.jitter_sec) y += `  jitter_sec: ${c.schedule.jitter_sec}\n`;
  if (c.schedule.start_delay_sec) y += `  start_delay_sec: ${c.schedule.start_delay_sec}\n`;
  y += `\noptions:\n  default_hold_sec: ${c.options.default_hold_sec}\n`;
  y += `  pause_between_cycles_sec: ${c.options.pause_between_cycles_sec}\n`;
  y += `  mouse_move_default_duration_sec: ${c.options.mouse_move_default_duration_sec}\n`;
  y += `  mouse_move_default_wobble: ${c.options.mouse_move_default_wobble}\n`;
  if (c.command_file) y += `\ncommand_file: ${c.command_file}\n`;
  if (c.commands && c.commands.length) y += `\ncommands:\n` + commandsToYaml(c.commands) + '\n';
  return y;
}

function buildYamlFromForm() {
  const p = buildPayloadFromForm();
  if (!p) return '';
  return taskToYaml({
    ...p,
    options: p.options || {},
    schedule: p.schedule || {type:'interval'},
  });
}

function editTask(name) {
  const t = tasks.find(t => t.config.name === name);
  if (t) openTaskModal(t);
}

// ── Monitor ──
let monitorRunning = false;
function toggleMonitor() {
  if (monitorRunning) {
    stopMonitor();
  } else {
    startMonitor();
  }
}

function startMonitor() {
  monitorRunning = true;
  document.getElementById('monitorToggle').textContent = '停止';
  document.getElementById('monitorToggle').classList.add('btn-danger');
  captureScreen();
  const interval = parseInt(document.getElementById('monitorInterval').value);
  monitorTimer = setInterval(captureScreen, interval);
  document.getElementById('monitorStatus').textContent = '监控中';
}

function stopMonitor() {
  monitorRunning = false;
  if (monitorTimer) { clearInterval(monitorTimer); monitorTimer = null; }
  document.getElementById('monitorToggle').textContent = '开始';
  document.getElementById('monitorToggle').classList.remove('btn-danger');
  document.getElementById('monitorStatus').textContent = '已停止';
}

async function captureScreen() {
  try {
    const res = await fetch(API + '/api/screen?format=base64');
    if (!res.ok) throw new Error('截图失败');
    const data = await res.json();
    document.getElementById('monitorImg').src = 'data:image/png;base64,' + data.image;
    document.getElementById('monitorStatus').textContent =
      '最近更新：' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('monitorStatus').textContent = '错误：' + e.message;
  }
}

// ── System ──
async function refreshSystem() {
  try {
    const data = await api('/api/system/status');
    const uptime = formatDuration(data.uptime_seconds);
    document.getElementById('systemStats').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">驱动类型</div>
        <div class="stat-value ${data.driver_type==='interception'?'green':'orange'}">${data.driver_type}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">任务总数</div>
        <div class="stat-value accent">${data.total_tasks}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">运行中</div>
        <div class="stat-value green">${data.running_tasks}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">运行时间</div>
        <div class="stat-value">${uptime}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">启动时间</div>
        <div class="stat-value" style="font-size:18px">${new Date(data.started_at).toLocaleString()}</div>
      </div>
    `;
    document.getElementById('sidebarStatus').innerHTML =
      `<span class="dot dot-green"></span>${data.running_tasks} 运行中 / 共 ${data.total_tasks} 个`;
  } catch(e) {
    document.getElementById('sidebarStatus').innerHTML =
      '<span class="dot dot-red"></span>连接失败';
  }
}

function formatDuration(sec) {
  if (sec < 60) return Math.round(sec) + ' 秒';
  if (sec < 3600) return Math.floor(sec/60) + ' 分 ' + Math.round(sec%60) + ' 秒';
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  return h + ' 小时 ' + m + ' 分';
}

// ── Utils ──
function esc(s) {
  if (typeof s !== 'string') return s;
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ──
refreshTasks();
refreshSystem();
setInterval(() => {
  if (currentSection === 'tasks') refreshTasks();
  refreshSystem();
}, 5000);
</script>
